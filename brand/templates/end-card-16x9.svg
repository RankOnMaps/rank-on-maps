<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" role="img" aria-label="YouTube end card">
  <rect width="1920" height="1080" fill="#1F4D3C"/>

  <!-- Background hairline grid -->
  <g stroke="#FAF8F2" stroke-opacity="0.08" stroke-width="1">
    <path d="M0 270 H1920 M0 540 H1920 M0 810 H1920"/>
    <path d="M480 0 V1080 M960 0 V1080 M1440 0 V1080"/>
  </g>

  <!-- Top mono receipt -->
  <text x="80"   y="64"  font-family="JetBrains Mono, Menlo, monospace" font-size="20" fill="#FAF8F2" fill-opacity="0.6" letter-spacing="6">RANK ON MAPS · END</text>
  <text x="1840" y="64"  text-anchor="end" font-family="JetBrains Mono, Menlo, monospace" font-size="20" fill="#FAF8F2" fill-opacity="0.6" letter-spacing="6">EP. 014 · 04:38</text>

  <!-- Headline -->
  <g font-family="Helvetica, Arial, sans-serif" font-weight="900" letter-spacing="-8">
    <text x="80" y="320" font-size="200" fill="#FAF8F2">RANK WHERE</text>
    <text x="80" y="500" font-size="200" fill="#D9D4C5">IT MATTERS.</text>
  </g>

  <!-- Slot for next-video card and subscribe -->
  <rect x="80" y="620" width="640" height="360" fill="#FAF8F2" fill-opacity="0.06"
        stroke="#FAF8F2" stroke-opacity="0.4" stroke-dasharray="14 10"/>
  <text x="400" y="820" text-anchor="middle"
        font-family="Helvetica, Arial, sans-serif" font-weight="900"
        font-size="28" fill="#FAF8F2" letter-spacing="3">NEXT EPISODE</text>

  <rect x="780" y="620" width="640" height="360" fill="#FAF8F2" fill-opacity="0.06"
        stroke="#FAF8F2" stroke-opacity="0.4" stroke-dasharray="14 10"/>
  <text x="1100" y="820" text-anchor="middle"
        font-family="Helvetica, Arial, sans-serif" font-weight="900"
        font-size="28" fill="#FAF8F2" letter-spacing="3">SUBSCRIBE</text>

  <!-- Brand corner -->
  <g transform="translate(1500 640) scale(0.6)">
    <path fill="#FAF8F2" d="M256 56c-66.3 0-120 53.7-120 120 0 24 7 46.4 19.2 65.2L256 388l100.8-146.8C369 222.4 376 200 376 176c0-66.3-53.7-120-120-120zm0 162c-23.2 0-42-18.8-42-42s18.8-42 42-42 42 18.8 42 42-18.8 42-42 42z"/>
  </g>
  <text x="1840" y="1010" text-anchor="end"
        font-family="JetBrains Mono, Menlo, monospace" font-weight="700"
        font-size="22" fill="#FAF8F2" letter-spacing="3">↗ RANKONMAPS.IO</text>
</svg>
